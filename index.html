<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeměpisný Kvíz | Interaktivní Mapa</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>

<body>
    <div id="login-overlay" class="glass">
        <div id="login-box">
            <div class="logo">GEO<span>MASTER</span></div>
            <h2>Přihlášení</h2>
            <p>Zadej své ID a heslo pro vstup</p>
            <div class="input-group">
                <input type="text" id="username" placeholder="Uživatelské jméno">
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="Heslo">
                    <button id="toggle-password" type="button" class="icon-btn">👁️</button>
                </div>
            </div>
            <button id="login-btn" class="primary-btn">Vstoupit</button>
            <p id="login-error" class="hidden wrong">Neplatné údaje!</p>
        </div>
    </div>

    <div id="app-container" class="hidden">
        <header>
            <div class="logo">GEO<span>MASTER</span></div>
            <div class="header-actions">
                <div id="user-info">Ahoj, <span id="current-user">Host</span></div>
                <button id="show-admin" class="secondary-btn admin-only hidden">Admin Panel</button>
                <div class="dropdown">
                    <button id="options-btn" class="secondary-btn">Možnosti ▾</button>
                    <div id="options-menu" class="dropdown-content glass hidden">
                        <label class="switch-item">
                            <span>Slepá mapa</span>
                            <input type="checkbox" id="toggle-blind-cb">
                            <span class="slider"></span>
                        </label>
                        <label class="switch-item">
                            <span>Zobrazit vše</span>
                            <input type="checkbox" id="toggle-all-cb">
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>
                <button id="show-leaderboard" class="secondary-btn">Žebříček</button>
                <div class="game-stats">
                    <div class="stat-item">Skóre: <span id="score">0</span></div>
                    <div class="stat-item">Kolo: <span id="total-questions">0</span></div>
                </div>
                <button id="logout-btn" class="secondary-btn">Odhlásit</button>
            </div>
        </header>

        <main>
            <div id="map"></div>

            <div id="game-overlay" class="glass">
                <div id="mode-selector">
                    <button class="mode-btn active" data-mode="find">Najdi</button>
                    <button class="mode-btn" data-mode="identify">Urči</button>
                    <button class="mode-btn" data-mode="typein">Napiš</button>
                </div>

                <div id="question-panel">
                    <h2 id="question-text">Připrav se...</h2>
                    <p id="sub-text">Klikni na start pro začátek hry</p>
                    <button id="start-game" class="primary-btn">Start Hry</button>
                </div>

                <div id="type-in-container" class="hidden">
                    <input type="text" id="name-input" placeholder="Jak se to jmenuje?" autocomplete="off">
                    <button id="submit-name" class="primary-btn">Odeslat</button>
                </div>

                <div id="feedback-panel" class="hidden">
                    <div id="feedback-message"></div>
                </div>
            </div>

            <div id="identify-options" class="hidden glass">
                <h3>Co je to za místo?</h3>
                <div id="options-container"></div>
            </div>

            <div id="leaderboard-overlay" class="hidden glass">
                <div class="leaderboard-header">
                    <h2>Nejlepší Hráči (Cloud Sync)</h2>
                    <button id="sync-scores" class="secondary-btn small">🔄 Sync</button>
                    <button id="close-leaderboard" class="close-btn">&times;</button>
                </div>
                <div id="leaderboard-content">
                    <table id="leaderboard-table">
                        <thead>
                            <tr>
                                <th>Pořadí</th>
                                <th>Hráč</th>
                                <th>Nejvyšší Skóre</th>
                            </tr>
                        </thead>
                        <tbody id="leaderboard-body">
                            <!-- Data populated via JS -->
                        </tbody>
                    </table>
                </div>
            </div>

            <div id="admin-panel" class="hidden glass">
                <div class="leaderboard-header">
                    <h2>Admin Panel</h2>
                    <button id="close-admin" class="close-btn">&times;</button>
                </div>
                <div class="admin-actions">
                    <div class="admin-section">
                        <h3>Vytvořit nový účet</h3>
                        <div class="admin-form">
                            <input type="text" id="new-user-id" placeholder="ID uživatele">
                            <input type="text" id="new-user-pass" placeholder="Heslo">
                            <button id="add-user-btn" class="primary-btn small">Přidat</button>
                        </div>
                    </div>
                    <div class="admin-section">
                        <h3>Seznam uživatelů</h3>
                        <div id="user-management-list">
                            <!-- Populated via JS -->
                        </div>
                    </div>
                    <div class="admin-section danger-zone">
                        <button id="reset-leaderboard" class="primary-btn danger small">Resetovat všechna skóre</button>
                    </div>
                </div>
            </div>
        </main>

        <div id="notification-area"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="app.js"></script>
</body>

</html>
