<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeměpisný Kvíz | Interaktivní Mapa</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>

<body>
    <div id="app-container">
        <header>
            <div class="logo">GEO<span>MASTER</span></div>
            <div class="header-actions">
                <div id="user-info">Hráč: <span id="current-user" role="button" aria-label="Změnit přezdívku" tabindex="0">Host</span></div>
                <div class="dropdown">
                    <button id="options-btn" class="secondary-btn" aria-haspopup="true" aria-expanded="false">Možnosti ▾</button>
                    <div id="options-menu" class="dropdown-content glass hidden" role="menu">
                        <label class="switch-item">
                            <span>Slepá mapa</span>
                            <input type="checkbox" id="toggle-blind-cb" role="switch">
                            <span class="slider"></span>
                        </label>
                        <label class="switch-item">
                            <span>Světlý mód</span>
                            <input type="checkbox" id="toggle-light-cb" role="switch">
                            <span class="slider"></span>
                        </label>
                        <label class="switch-item">
                            <span>Zobrazit vše</span>
                            <input type="checkbox" id="toggle-all-cb" role="switch">
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>
                <button id="show-terms" class="secondary-btn">Pojmy</button>
                <div class="game-stats" aria-label="Herní statistiky">
                    <div class="stat-item">Skóre: <span id="score" aria-live="polite">0</span></div>
                    <div class="stat-item">Kolo: <span id="total-questions">0</span></div>
                </div>
            </div>
        </header>

        <main>
            <div id="map"></div>

            <div id="game-overlay" class="glass">
                <div id="mode-selector">
                    <button class="mode-btn active" data-mode="find">Najdi</button>
                    <button class="mode-btn" data-mode="identify">Urči</button>
                    <button class="mode-btn" data-mode="typein">Napiš</button>
                </div>

                <div id="question-panel">
                    <h2 id="question-text">Připrav se...</h2>
                    <p id="sub-text">Klikni na start pro začátek hry</p>
                    <button id="start-game" class="primary-btn">Start Hry</button>
                </div>

                <div id="type-in-container" class="hidden">
                    <input type="text" id="name-input" placeholder="Jak se to jmenuje?" autocomplete="off">
                    <button id="submit-name" class="primary-btn">Odeslat</button>
                </div>

                <div id="feedback-panel" class="hidden">
                    <div id="feedback-message"></div>
                </div>
            </div>

            <div id="identify-options" class="hidden glass">
                <h3>Co je to za místo?</h3>
                <div id="options-container"></div>
            </div>

            <div id="terms-overlay" class="hidden glass">
                <div class="modal-header">
                    <h2>Seznam všech pojmů</h2>
                    <button id="close-terms" class="close-btn">&times;</button>
                </div>
                <div id="terms-content">
                    <!-- Categories and terms will be injected here -->
                </div>
            </div>
        </main>

        <div class="creator-credit">Made by <span>Jan Votoček</span></div>
        <div id="notification-area"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="app.js"></script>
</body>

</html>
